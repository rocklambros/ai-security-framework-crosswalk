name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linter
        run: pip install ruff

      - name: Lint check (project2 + classifier contracts)
        run: ruff check project2/ classifier/tests/contract_no_frozen_leak.py classifier/tests/test_pre_registered_lockfile.py

  smoke:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project2/requirements.txt
          pip install pytest pytest-timeout

      - name: Run project2 smoke tests
        run: pytest project2/tests/ -x -q --timeout=30

  test:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-classifier.txt

      - name: Verify frozen split hashes
        run: python -m classifier.data.splits verify-hashes

      - name: Run firewall contract tests
        run: |
          pytest classifier/tests/contract_no_frozen_leak.py -x -q
          pytest classifier/tests/test_pre_registered_lockfile.py -x -q

      - name: Run project2 tests
        run: pytest project2/tests/ -x -q

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project2/requirements.txt
          pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --desc
