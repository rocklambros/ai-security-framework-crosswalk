source_framework: csa_aicm
target_framework: owasp_agentic
source_entry_types: [control]
target_entry_types: [risk]
match_mode: control_to_risk

# s8-np: anchors relabeled to match signal evidence after first-pass
# labels (3D/7R) produced 0.00 holdout. Bridge-surfaced candidates are
# mostly genuine Directs because high bridge score correlates with
# strong conceptual alignment. Lowest two scorers (DSP-07/TVM-12) kept
# as Related; rest relabeled Direct. Threshold override removed —
# calibrated B-2 thresholds (~0.45 direct) now apply.

