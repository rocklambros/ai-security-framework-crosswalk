    - {source: "csa_aicm:IAM-04", target: "owasp_agentic:ASI03", expected_tier: "Direct"}
    - {source: "csa_aicm:IAM-14", target: "owasp_agentic:ASI03", expected_tier: "Direct"}
    - {source: "csa_aicm:IAM-04", target: "owasp_agentic:ASI02", expected_tier: "Direct"}
    - {source: "csa_aicm:IAM-14", target: "owasp_agentic:ASI02", expected_tier: "Direct"}
    - {source: "csa_aicm:LOG-05", target: "owasp_agentic:ASI07", expected_tier: "Direct"}
    - {source: "csa_aicm:LOG-01", target: "owasp_agentic:ASI07", expected_tier: "Related"}
    - {source: "csa_aicm:TVM-12", target: "owasp_agentic:ASI06", expected_tier: "Related"}
    - {source: "csa_aicm:MDS-10", target: "owasp_agentic:ASI08", expected_tier: "Direct"}
    - {source: "csa_aicm:MDS-07", target: "owasp_agentic:ASI06", expected_tier: "Related"}
