# Domain-specific synonym groups for keyword expansion.
#
# Format: a YAML list of lists. Each inner list is a set of terms considered
# equivalent for the purpose of keyword/TF-IDF overlap. During signal
# computation, if any term in a group is present in a document's text, the
# other terms in the group are appended to expand recall.
#
# To add a new group: append a new `- [term1, term2, ...]` entry below. Keep
# terms lowercase and prefer short noun phrases. Avoid overly broad groups
# that would cause unrelated documents to collide.
#
# Source: migrated from aiuc/signals.py SYNONYM_GROUPS (v1 pipeline).

- ["tool call", "tool misuse", "tool invocation", "tool use", "tool execution"]
- ["prompt injection", "adversarial input", "adversarial prompt", "goal hijack"]
- ["privilege", "access control", "authorization", "permission", "least privilege"]
