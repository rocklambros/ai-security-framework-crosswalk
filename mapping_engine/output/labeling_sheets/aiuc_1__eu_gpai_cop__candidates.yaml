  target_name: EU AI Act Article 43
  target_description: Conformity Assessment. This article discusses the process of
    assessing whether high-risk AI systems meet certain standards. If a provider has
    used certain standards in creating their AI system, they must choose one of two
    assessment procedures. If the provider hasn't used these standards, or only used
    part of them, they must follow a specific assessment procedure. If the AI system
    is for law enforcement or immigration authorities, a market surveillance authority
    will act as the assessment body. The article also states that if an AI system
    is significantly modified, it must undergo a new assessment. The Commission can
    update these procedures as technology advances.
