  target_name: 'Measure 7.3: Documentation of systemic risk identification, analysis,
    and mitigation'
  target_description: "Signatories will provide in the Model Report: (1) a description\
    \ of the results of their systemic risk identification and analysis and any information\
    \ relevant to understanding them including: (a) a description of their systemic\
    \ risk identification process for risks belonging to the types of risks in Appendix\
    \ 1.1 (pursuant to Measure 2.1, point (1)); (b) explanations of uncertainties\
    \ and assumptions about how the model would be used and integrated into AI systems;\
    \ (c) a description of the results of their systemic risk modelling for the systemic\
    \ risks (pursuant to Measure 3.3); (d) a description of the systemic risks stemming\
    \ from the model and a justification therefor, including: (i) the systemic risk\
    \ estimates (pursuant to Measure 3.4); and (ii) a comparison between systemic\
    \ risks with safety and security mitigations implemented and with the model fully\
    \ elicited (pursuant to Appendix 3.2); (e) all results of model evaluations relevant\
    \ to understanding the systemic risks stemming from the model and descriptions\
    \ of: (i) how the evaluations were conducted; (ii) the tests and tasks involved\
    \ in the model evaluations; (iii) how the model evaluations were scored; (iv)\
    \ how the model was elicited (pursuant to Appendix 3.2); (v) how the scores compare\
    \ to human baselines (where applicable), across the model versions, and across\
    \ the evaluation settings; (f) at least five, random samples of inputs and outputs\
    \ from each relevant model evaluation, such as completions, generations, and/or\
    \ trajectories, to facilitate independent interpretation of the model evaluation\
    \ results and understanding of the systemic risks stemming from the model. If\
    \ particular trajectories materially inform the understanding of a systemic risk,\
    \ such trajectories will also be provided. Further, Signatories will provide a\
    \ sufficiently large number of random samples of inputs and outputs from a relevant\
    \ model evaluation if subsequently asked by the AI Office; (g) a description of\
    \ the access and other resources provided to: (i) internal model evaluation teams\
    \ (pursuant to Appendix 3.4); and (ii) independent external evaluators pursuant\
    \ to Appendix 3.5. Alternatively to the preceding point (ii), Signatories will\
    \ procure any such independent external evaluators to provide the requisite information\
    \ directly to the AI Office at the same time that the Signatory supplies its Model\
    \ Report to the AI Office; and (h) if they make use of the \u201Csimilarly safe\
    \ or safer model\u201D concept pursuant to Appendix 2, provide a justification\
    \ of how the criteria for \u201Csafe reference model\u201D (pursuant to Appendix\
    \ 2.1) and the criteria for \u201Csimilarly safe or safer model\u201D (pursuant\
    \ to Appendix 2.2) are fulfilled; (2) a description of: (a) all safety mitigations\
    \ implemented (pursuant to Commitment 5); (b) how they fulfil the requirements\
    \ of Measure 5.1; and (c) their limitations (e.g. if training on examples of undesirable\
    \ model behaviour makes identifying future instances of such behaviour more difficult);\
    \ (3) a description of: (a) the Security Goal (pursuant to Measure 6.1); (b) all\
    \ security mitigations implemented (pursuant to Measure 6.2); (c) how the mitigations\
    \ meet the Security Goal, including the extent to which they align with relevant\
    \ international standards or other relevant guidance (such as the RAND Securing\
    \ AI Model Weights report); and (d) if Signatories have deviated from a listed\
    \ security mitigation in one (or more) of Appendices 4.1 to 4.5, points (a), a\
    \ justification for how the alternative security mitigations they have implemented\
    \ achieve the respective mitigation objectives; and (4) a high-level description\
    \ of: (a) the techniques and assets they intend to use to further develop the\
    \ model over the next six months, including through the use of other AI models\
    \ and/or AI systems; (b) how such future versions and more advanced models may\
    \ differ from the Signatory\u2019s current ones, in terms of capabilities and\
    \ propensities; and (c) any new or materially updated safety and security mitigat"
