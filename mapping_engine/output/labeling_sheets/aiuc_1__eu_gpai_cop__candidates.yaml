  target_name: EU AI Act Article 44
  target_description: Certificates. This article states that certificates for AI systems
    must be written in a language that can be easily understood by the relevant authorities
    in the country where the certificate is issued. These certificates are valid for
    up to five years for certain AI systems, and four years for others. They can be
    extended upon request, but only after a re-assessment. If an AI system no longer
    meets the necessary requirements, the certificate can be suspended or withdrawn,
    unless the provider takes corrective action. There must also be an appeal process
    for decisions made about these certificates.
