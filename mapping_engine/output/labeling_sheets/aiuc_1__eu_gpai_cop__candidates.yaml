  target_name: EU AI Act Article 27
  target_description: Fundamental Rights Impact Assessment for High-Risk AI Systems.
    Before using a high-risk AI system, public bodies and private entities providing
    public services must assess how the system could impact people's fundamental rights.
    This includes describing how and when the system will be used, who it might affect,
    and what risks it might pose. They also need to outline how humans will oversee
    the system and what steps will be taken if risks materialize. This assessment
    must be done for the first use of the system, but can be updated if necessary.
    The results must be reported to the market surveillance authority, unless exempt.
    The AI Office will provide a template to help with this process.
