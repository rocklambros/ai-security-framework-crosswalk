  target_name: EU AI Act Article 46
  target_description: Derogation from Conformity Assessment Procedure. This article
    allows for exceptions to the usual approval process for high-risk AI systems.
    If there's a justified reason, such as public safety or environmental protection,
    a market surveillance authority can allow these systems to be used for a limited
    time while they're being assessed. In urgent situations, law enforcement or civil
    protection authorities can use these systems without prior approval, as long as
    they request it soon after. If approval is denied, the system must be stopped
    and its results discarded. The EU Commission and other member states must be informed
    of any approvals, and if no objections are raised within 15 days, the approval
    is considered justified. If objections are raised, the Commission will consult
    with the relevant parties and decide if the approval is justified. If it's not,
    the approval must be withdrawn.
