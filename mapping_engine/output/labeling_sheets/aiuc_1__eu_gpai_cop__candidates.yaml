  target_name: EU AI Act Article 50
  target_description: Transparency Obligations for Providers and Deployers of Certain
    AI Systems. This article states that companies must inform users when they are
    interacting with an AI system, unless it's obvious or the AI is used for legal
    purposes like crime detection. AI systems that create synthetic content (like
    deepfakes) must mark their outputs as artificially generated. Companies must also
    inform users when they use AI for emotion recognition or biometric categorisation,
    unless it's for legal purposes. If an AI system creates or alters content, the
    company must disclose this, unless it's for legal purposes or the content is artistic
    or satirical. The AI Office will help create guidelines for detecting and labelling
    artificially generated content.
