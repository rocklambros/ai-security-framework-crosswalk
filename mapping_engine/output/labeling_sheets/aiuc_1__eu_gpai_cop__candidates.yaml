  target_name: 'Measure 1.1: Creating the Framework'
  target_description: "Signatories will create a state-of-the-art Framework, taking\
    \ into account the models they are developing, making available on the market,\
    \ and/or using. The Framework will contain a high-level description of implemented\
    \ and planned processes and measures for systemic risk assessment and mitigation\
    \ to adhere to this Chapter. In addition, the Framework will contain: (1) a description\
    \ and justification of the trigger points and their usage, at which the Signatories\
    \ will conduct additional lighter-touch model evaluations along the entire model\
    \ lifecycle, as specified in Measure 1.2, second paragraph, point (1)(a); (2)\
    \ for the Signatories\u2019 determination of whether systemic risk is considered\
    \ acceptable, as specified in Commitment 4: (a) a description and justification\
    \ of the systemic risk acceptance criteria, including the systemic risk tiers,\
    \ and their usage as specified in Measure 4.1; (b) a high-level description of\
    \ what safety and security mitigations Signatories would need to implement once\
    \ each systemic risk tier is reached; (c) for each systemic risk that Signatories\
    \ defined systemic risk tiers for as specified in Measure 4.1, estimates of timelines\
    \ when Signatories reasonably foresee that they will have a model that exceeds\
    \ the highest systemic risk tier already reached by any of their existing models.\
    \ Such estimates: (i) may consist of time ranges or probability distributions;\
    \ and (ii) may take into account aggregate forecasts, surveys, and other estimates\
    \ produced with other providers. Further, such estimates will be supported by\
    \ justifications, including underlying assumptions and uncertainties; and (d)\
    \ a description of whether and, if so, by what process input from external actors,\
    \ including governments, influences proceeding with the development, making available\
    \ on the market, and/or use of the Signatories\u2019 models as specified in Measure\
    \ 4.2, other than as the result of independent external evaluations; (3) a description\
    \ of how systemic risk responsibility is allocated for the processes by which\
    \ systemic risk is assessed and mitigated as specified in Commitment 8; and (4)\
    \ a description of the process by which Signatories will update the Framework,\
    \ including how they will determine that an updated Framework is confirmed, as\
    \ specified in Measure 1.3. Signatories will have confirmed the Framework no later\
    \ than four weeks after having notified the Commission pursuant to Article 52(1)\
    \ AI Act and no later than two weeks before placing the model on the market."
