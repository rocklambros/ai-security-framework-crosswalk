    commit to analysing each identified systemic risk (pursuant to Commitment 2).
    The purpose of systemic risk analysis includes facilitating systemic risk acceptance
    determination (pursuant to Commitment 4). Systemic risk analysis involves five
    elements for each identified systemic risk, which may overlap and may need to
    be implemented recursively: (1) gathering model-independent information (as specified
    in Measure 3.1); (2) conducting model evaluations (as specified in Measure 3.2);
    (3) modelling the systemic risk (as specified in Measure 3.3); and (4) estimating
    the systemic risk (as specified in Measure 3.4); while (5) conducting post-market
    monitoring (as specified in Measure 3.5).'
