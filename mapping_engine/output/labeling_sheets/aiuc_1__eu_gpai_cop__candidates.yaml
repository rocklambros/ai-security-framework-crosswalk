  target_name: 'Measure 8.1: Definition of clear responsibilities'
  target_description: "Signatories will clearly define responsibilities for managing\
    \ the systemic risks stemming from their models across all levels of the organisation.\
    \ This includes the following responsibilities: (1) Systemic risk oversight: Overseeing\
    \ the Signatories\u2019 systemic risk assessment and mitigation processes and\
    \ measures. (2) Systemic risk ownership: Managing systemic risks stemming from\
    \ Signatories\u2019 models, including the systemic risk assessment and mitigation\
    \ processes and measures, and managing the response to serious incidents. (3)\
    \ Systemic risk support and monitoring: Supporting and monitoring the Signatories\u2019\
    \ systemic risk assessment and mitigation processes and measures. (4) Systemic\
    \ risk assurance: Providing internal and, as appropriate, external assurance about\
    \ the adequacy of the Signatories\u2019 systemic risk assessment and mitigation\
    \ processes and measures to the management body in its supervisory function or\
    \ another suitable independent body (such as a council or board). Signatories\
    \ will allocate these responsibilities, as suitable for the Signatories\u2019\
    \ governance structure and organisational complexity, across the following levels\
    \ of their organisation: (1) the management body in its supervisory function or\
    \ another suitable independent body (such as a council or board); (2) the management\
    \ body in its executive function; (3) relevant operational teams; (4) if available,\
    \ internal assurance providers (e.g. an internal audit function); and (5) if available,\
    \ external assurance providers (e.g. third-party auditors). This Measure is presumed\
    \ to be fulfilled, if Signatories, as appropriate for the systemic risks stemming\
    \ from their models, adhere to all of the following: (1) Systemic risk oversight:\
    \ The responsibility for overseeing the Signatory\u2019s systemic risk management\
    \ processes and measures has been assigned to a specific committee of the management\
    \ body in its supervisory function (e.g. a risk committee or audit committee)\
    \ or one or multiple suitable independent bodies (such as councils or boards).\
    \ For Signatories that are SMEs or SMCs, this responsibility may be primarily\
    \ assigned to an individual member of the management body in its supervisory function.\
    \ (2) Systemic risk ownership: The responsibility for managing systemic risks\
    \ from models has been assigned to suitable members of the management body in\
    \ its executive function who are also responsible for relevant Signatory core\
    \ business activities that may give rise to systemic risk, such as research and\
    \ product development (e.g. Head of Research or Head of Product). The members\
    \ of the management body in its executive function have assigned lower-level responsibilities\
    \ to operational managers who oversee parts of the systemic-risk- producing business\
    \ activities (e.g. specific research domains or specific products). Depending\
    \ on the organisational complexity, there may be a cascading responsibility structure.\
    \ (3) Systemic risk support and monitoring: The responsibility for supporting\
    \ and monitoring the Signatory\u2019s systemic risk management processes and measures,\
    \ including conducting risk assessments, has been assigned to at least one member\
    \ of the management body in its executive function (e.g. a Chief Risk Officer\
    \ or a Vice President, Safety & Security Framework). This member(s) must not also\
    \ be responsible for the Signatory\u2019s core business activities that may produce\
    \ systemic risk (e.g. research and product development). For Signatories that\
    \ are SMEs or SMCs, there is at least one individual in the management body in\
    \ its executive function tasked with supporting and monitoring the Signatory\u2019\
    s systemic risk assessment and mitigation processes and measures. (4) Systemic\
    \ risk assurance: The responsibility for providing assurance about the adequacy\
    \ of the Signatory\u2019s systemic risk assessment and mitigation processes and\
    \ measures to the management body in its supervisory function or another suitable\
    \ independent body (such as a council or board) has been assigned to a relevant\
    \ party"
