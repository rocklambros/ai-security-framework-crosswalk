  target_name: 'Measure 4.1: Systemic risk acceptance criteria and acceptance determination'
  target_description: 'Signatories will describe and justify (in the Framework pursuant
    to Measure 1.1, point (2)(a)) how they will determine whether the systemic risks
    stemming from the model are acceptable. To do so, Signatories will: (1) for each
    identified systemic risk (pursuant to Measure 2.1), at least: (a) define appropriate
    systemic risk tiers that: (i) are defined in terms of model capabilities, and
    may additionally incorporate model propensities, risk estimates, and/or other
    suitable metrics; (ii) are measurable; and (iii) comprise at least one systemic
    risk tier that has not been reached by the model; or (b) define other appropriate
    systemic risk acceptance criteria, if systemic risk tiers are not suitable for
    the systemic risk and the systemic risk is not a specified systemic risk (pursuant
    to Appendix 1.4); (2) describe how they will use these tiers and/or other criteria
    to determine whether each identified systemic risk (pursuant to Measure 2.1) and
    the overall systemic risk are acceptable; and (3) justify how the use of these
    tiers and/or other criteria pursuant to point (2) ensures that each identified
    systemic risk (pursuant to Measure 2.1) and the overall systemic risk are acceptable.
    Signatories will apply the systemic risk acceptance criteria to each identified
    systemic risk (pursuant to Measure 2.1), incorporating a safety margin (as specified
    in the following paragraph), to determine whether each identified systemic risk
    (pursuant to Measure 2.1) and the overall systemic risk are acceptable. This acceptance
    determination will take into account at least the information gathered via systemic
    risk identification and analysis (pursuant to Commitments 2 and 3). The safety
    margin will: (1) be appropriate for the systemic risk; and (2) take into account
    potential limitations, changes, and uncertainties of: (a) systemic risk sources
    (e.g. capability improvements after the time of assessment); (b) systemic risk
    assessments (e.g. under-elicitation of model evaluations or historical accuracy
    of similar assessments); and (c) the effectiveness of safety and security mitigations
    (e.g. mitigations being circumvented, deactivated, or subverted).'
