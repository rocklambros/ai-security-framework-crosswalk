  target_name: EU AI Act Article 72
  target_description: Post-Market Monitoring by Providers and Post-Market Monitoring
    Plan for High-Risk AI Systems. The EU AI Act requires providers of high-risk AI
    systems to establish a post-market monitoring system. This system should collect
    and analyze data on the performance of these AI systems throughout their lifetime,
    ensuring they continue to comply with regulations. The monitoring system should
    be based on a plan that is part of the technical documentation. The EU Commission
    will provide a template for this plan. If a monitoring system is already in place
    under other legislation, providers can integrate the necessary elements from this
    new requirement, as long as it provides the same level of protection.
