  target_name: 'Measure 7.6: Model Report updates'
  target_description: "Signatories will update their Model Report if they have reasonable\
    \ grounds to believe that the justification for why the systemic risks stemming\
    \ from the model are acceptable (pursuant to Measure 7.2, point (1)) has been\
    \ materially undermined. Examples of such grounds are: (1) one of the conditions\
    \ listed pursuant to Measure 7.2, point (2), has materialised; (2) the model\u2019\
    s capabilities, propensities, and/or affordances have changed or will change materially,\
    \ such as through further post-training, access to additional tools, or increase\
    \ in inference compute; (3) the model\u2019s use and/or integrations into AI systems\
    \ have changed or will change materially; (4) serious incidents and/or near misses\
    \ involving the model or a similar model have occurred; and/or (5) developments\
    \ have occurred that materially undermine the external validity of model evaluations\
    \ conducted, materially improve the state of the art of model evaluation methods,\
    \ and/or for other reasons suggest that the systemic risk assessment conducted\
    \ is materially inaccurate. Model Report updates should be completed within a\
    \ reasonable amount of time after the Signatory becomes aware of the grounds that\
    \ necessitate an update, e.g. after discovering them as part of their continuous\
    \ systemic risk assessment and mitigation (pursuant to Measure 1.2, second paragraph).\
    \ If a Model Report update is triggered by a deliberate change to a model and\
    \ that change is made available on the market, the Model Report update and the\
    \ underlying full systemic risk assessment and mitigation process (pursuant to\
    \ Measure 1.2, third paragraph) need to be completed before the change is made\
    \ available on the market. Further, if the model is amongst their respective most\
    \ capable models available on the market, Signatories will provide the AI Office\
    \ with an updated Model Report at least every six months. Signatories do not need\
    \ to do so if: (1) the model\u2019s capabilities, propensities, and/or affordances\
    \ have not changed since they have last provided the AI Office with the Model\
    \ Report, or update thereof; (2) they will place a more capable model on the market\
    \ in less than a month; and/or (3) the model is considered similarly safe or safer\
    \ (pursuant to Appendix 2.2) for each identified systemic risk (pursuant to Measure\
    \ 2.1). The updated Model Report will contain: (1) the updated information specified\
    \ in Measures 7.1 to 7.5 based on the results of the full systemic risk assessment\
    \ and mitigation process (pursuant to Measure 1.2, third paragraph); and (2) a\
    \ changelog, describing how and why the Model Report has been updated, along with\
    \ a version number and the date of change."
