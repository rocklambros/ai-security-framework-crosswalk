  target_name: 'Measure 5.1: Appropriate safety mitigations'
  target_description: "Signatories will implement safety mitigations that are appropriate,\
    \ including sufficiently robust under adversarial pressure (e.g. fine-tuning attacks\
    \ or jailbreaking), taking into account the model\u2019s release and distribution\
    \ strategy. Examples of safety mitigations are: (1) filtering and cleaning training\
    \ data, e.g. data that might result in undesirable model propensities such as\
    \ unfaithful chain-of-thought traces; (2) monitoring and filtering the model\u2019\
    s inputs and/or outputs; (3) changing the model behaviour in the interests of\
    \ safety, such as fine-tuning the model to refuse certain requests or provide\
    \ unhelpful responses; (4) staging the access to the model, e.g. by limiting API\
    \ access to vetted users, gradually expanding access based on post-market monitoring,\
    \ and/or not making the model parameters publicly available for download initially;\
    \ (5) offering tools for other actors to use to mitigate the systemic risks stemming\
    \ from the model; (6) techniques that provide high-assurance quantitative safety\
    \ guarantees concerning the model\u2019s behaviour; (7) techniques to enable safe\
    \ ecosystems of AI agents, such as model identifications, specialised communication\
    \ protocols, or incident monitoring tools; and/or (8) other emerging safety mitigations,\
    \ such as for achieving transparency into chain-of-thought reasoning or defending\
    \ against a model\u2019s ability to subvert its other safety mitigations."
