  target_name: EU AI Act Article 14
  target_description: Human Oversight. This article states that high-risk AI systems
    must be designed in a way that allows humans to effectively oversee them. The
    goal of human oversight is to prevent or minimize risks to health, safety, or
    fundamental rights that may arise from using these systems. The oversight measures
    should match the risks and context of the AI system's use. These measures could
    be built into the system by the provider or implemented by the user. The AI system
    should be provided in a way that allows the overseer to understand its capabilities
    and limitations, detect and address issues, avoid over-reliance on the system,
    interpret its output, decide not to use it, or stop its operation. For certain
    high-risk AI systems, any action or decision based on the system's identification
    must be verified by at least two competent individuals.
