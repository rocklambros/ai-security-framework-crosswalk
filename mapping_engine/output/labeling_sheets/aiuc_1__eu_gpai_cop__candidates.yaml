  notes: Harmful output prevention supports framework implementation.
  source_name: Prevent harmful outputs
  source_description: Implement safeguards to prevent harmful outputs including distressed
    outputs, angry responses, high-risk advice, offensive content, bias, and deception.
  target_name: 'Measure 1.2: Implementing the Framework'
  target_description: "Signatories will implement the processes and measures outlined\
    \ in their Framework as specified in the following paragraphs. Along the entire\
    \ model lifecycle, Signatories will continuously: (1) assess the systemic risks\
    \ stemming from the model by: (a) conducting lighter-touch model evaluations that\
    \ need not adhere to Appendix 3 (e.g. automated evaluations) at appropriate trigger\
    \ points defined in terms of, e.g. time, training compute, development stages,\
    \ user access, inference compute, and/or affordances; (b) conducting post-market\
    \ monitoring after placing the model on the market, as specified in Measure 3.5;\
    \ (c) taking into account relevant information about serious incidents (pursuant\
    \ to Commitment 9); and (d) increasing the breadth and/or depth of assessment\
    \ or conducting a full systemic risk assessment and mitigation process that is\
    \ specified in the following paragraph, based on the results of points (a), (b),\
    \ and (c); and (2) implement systemic risk mitigations taking into account the\
    \ results of point (1), including addressing serious incidents as appropriate.\
    \ Figure 2. Illustrative timeline of systemic risk assessment and mitigation along\
    \ the model lifecycle. In addition, Signatories will implement a full systemic\
    \ risk assessment and mitigation process that involves four steps, without needing\
    \ to duplicate parts of the model\u2019s previous systemic risk assessments that\
    \ are still appropriate: (1) identifying the systemic risks stemming from the\
    \ model as specified in Commitment 2; (2) analysing each identified systemic risk\
    \ as specified in Commitment 3; (3) determining whether the systemic risks stemming\
    \ from the model are acceptable as specified in Measure 4.1; and (4) if the systemic\
    \ risks stemming from the model are not determined to be acceptable, implementing\
    \ safety and/or security mitigations as specified in Commitments 5 and 6, and\
    \ re-assessing the systemic risks stemming from the model starting from point\
    \ (1), as specified in Measure 4.2. Signatories will conduct such a full systemic\
    \ risk assessment and mitigation process at least before placing the model on\
    \ the market and whenever the conditions specified in Measure 7.6, first and third\
    \ paragraph, are met. Signatories will report their implemented measures and processes\
    \ to the AI Office as specified in Commitment 7. Figure 3. Full systemic risk\
    \ assessment and mitigation process."
