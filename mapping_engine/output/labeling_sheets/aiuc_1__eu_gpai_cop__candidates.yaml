  target_description: Obligations of Providers of High-Risk AI Systems. This article
    states that companies providing high-risk AI systems must follow certain rules.
    They must make sure their AI systems meet specific standards and display their
    contact information on the product or its packaging. They need to have a quality
    management system and keep certain documents and logs. Before selling or using
    the AI system, they must have it checked for compliance with regulations. They
