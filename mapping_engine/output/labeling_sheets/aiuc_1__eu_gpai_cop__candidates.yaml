    that companies providing high-risk AI systems must, when asked by a relevant authority,
    provide all the information needed to show that their AI system meets the required
    standards. This information must be in a language that the authority can easily
    understand. If asked, these companies must also allow the authority to access
    automatically generated logs of the AI system, as long as they control these logs.
    Any information obtained by the authority must be treated confidentially.
