  target_name: 'Measure 4.2: Proceeding or not proceeding based on systemic risk acceptance'
  target_description: 'determination Signatories will only proceed with the development,
    the making available on the market, and/or the use of the model, if the systemic
    risks stemming from the model are determined to be acceptable (pursuant to Measure
    4.1). If the systemic risks stemming from the model are not determined to be acceptable
    or are reasonably foreseeable to be soon not determined to be acceptable (pursuant
    to Measure 4.1), Signatories will take appropriate measures to ensure the systemic
    risks stemming from the model are and will remain acceptable prior to proceeding.
    In particular, Signatories will: (1) not make the model available on the market,
    restrict the making available on the market (e.g. via adjusting licenses or usage
    restrictions), withdraw, or recall the model, as necessary; (2) implement safety
    and/or security mitigations (pursuant to Commitments 5 and 6); and (3) conduct
    another round of systemic risk identification (pursuant to Commitment 2), systemic
    risk analysis (pursuant to Commitment 3), and systemic risk acceptance determination
    (pursuant to this Commitment).'
