  source_description: Implement adversarial testing program to validate system resilience
    against adversarial inputs and prompt injection attempts.
  target_name: EU AI Act Article 11
  target_description: Technical Documentation. This EU law states that before a high-risk
    AI system is launched, detailed technical documentation must be prepared and kept
    updated. This documentation should prove that the AI system meets the law's requirements
    and provide clear information for authorities to check compliance. It should include
    certain key elements. Small businesses, including start-ups, can provide this
    information in a simpler way. The EU will create a simplified form for this purpose.
    If a high-risk AI system is related to a product covered by other EU laws, one
    set of documentation should include all necessary information. The EU can update
    these requirements as technology advances.
