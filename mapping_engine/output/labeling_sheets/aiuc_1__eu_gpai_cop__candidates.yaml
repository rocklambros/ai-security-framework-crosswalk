  target_name: 'Measure 8.3: Promotion of a healthy risk culture'
  target_description: "Signatories will promote a healthy risk culture and take appropriate\
    \ measures to ensure that actors who have been assigned responsibilities for managing\
    \ the systemic risks stemming from their models (pursuant to Measure 8.1) take\
    \ a reasoned and balanced approach to systemic risk. Examples of indicators of\
    \ a healthy risk culture for the purpose of this Measure are: (1) setting the\
    \ tone for a healthy systemic risk culture from the top, e.g. by the leadership\
    \ clearly communicating the Signatory\u2019s Framework to staff; (2) allowing\
    \ clear communication and challenge of decisions concerning systemic risk; (3)\
    \ setting incentives and affording sufficient independence of staff involved in\
    \ systemic risk assessment and mitigation to discourage excessive systemic-risk-taking\
    \ and encourage an unbiased assessment of the systemic risks stemming from their\
    \ models; (4) anonymous surveys find that staff are comfortable raising concerns\
    \ about systemic risks, are aware of channels for doing so, and understand the\
    \ Signatory\u2019s Framework; (5) internal reporting channels are actively used\
    \ and reports are acted upon appropriately; (6) annually informing workers of\
    \ the Signatory\u2019s whistleblower protection policy and making such policy\
