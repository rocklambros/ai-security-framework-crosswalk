  notes: Penetration test reports are canonical model evaluation evidence.
  source_name: Penetration test reports incorporating AI-specific test cases, shared
    threat models, and testing calendars.
  source_description: Penetration test reports incorporating AI-specific test cases,
    shared threat models, and testing calendars.
  target_name: 'Measure 3.2: Model evaluations'
  target_description: "Signatories will conduct at least state-of-the-art model evaluations\
    \ in the modalities relevant to the systemic risk to assess the model\u2019s capabilities,\
    \ propensities, affordances, and/or effects, as specified in Appendix 3. Signatories\
    \ will ensure that such model evaluations are designed and conducted using methods\
    \ that are appropriate for the model and the systemic risk, and include open-ended\
    \ testing of the model to improve the understanding of the systemic risk, with\
    \ a view to identifying unexpected behaviours, capability boundaries, or emergent\
    \ properties. Examples of model evaluation methods are: Q&A sets, task-based evaluations,\
    \ benchmarks, red-teaming and other methods of adversarial testing, human uplift\
    \ studies, model organisms, simulations, and/or proxy evaluations for classified\
    \ materials. Further, the design of the model evaluations will be informed by\
    \ the model-independent information gathered pursuant to Measure 3.1."
