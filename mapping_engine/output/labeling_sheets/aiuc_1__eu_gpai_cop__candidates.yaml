  target_name: 'Measure 7.7: Model Report notifications'
  target_description: Signatories will provide the AI Office with access to the Model
    Report (without redactions, unless they are required by national security laws
    to which Signatories are subject) by the time they place a model on the market,
    e.g. through a publicly accessible link or through a sufficiently secure channel
    specified by the AI Office. If a Model Report is updated, Signatories will provide
    the AI Office with access to the updated Model Report (without redactions, unless
    they are required by national security laws to which Signatories are subject)
    within five business days of a confirmed update. To facilitate the placing on
    the market of a model, Signatories may delay providing the AI Office with a Model
    Report, or an update thereof, by up to 15 business days. This may be done only
    if the AI Office considers the Signatory to be acting in good faith and if the
    Signatory provides an interim Model Report, containing the information specified
    in Measures 7.2 and 7.5, to the AI Office without delay.
