  target_name: EU AI Act Article 20
  target_description: Corrective Actions and Duty of Information. This article states
    that if a company providing a high-risk AI system realizes that their system is
    not following the rules set by the EU, they must immediately fix the issue, stop
    using it, or recall it. They must also inform anyone involved in distributing
    or using the system. If the system poses a risk, the company must investigate
    why and inform the authorities responsible for monitoring the AI market. They
    must also inform any organization that certified the system, detailing what went
    wrong and what they did to fix it.
