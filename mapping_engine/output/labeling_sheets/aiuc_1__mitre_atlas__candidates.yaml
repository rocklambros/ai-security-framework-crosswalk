  notes: Discriminatory pattern monitoring helps detect prompt obfuscation.
  source_name: Monitoring for discriminatory patterns and implementing fairness checks.
  source_description: Monitoring for discriminatory patterns and implementing fairness
    checks.
  target_name: LLM Prompt Obfuscation
  target_description: 'Adversaries may hide or otherwise obfuscate prompt injections
    or retrieval content to avoid detection from humans, large language model (LLM)
    guardrails, or other detection mechanisms.


    For text inputs, this may include modifying how the instructions are rendered
    such as small text, text colored the same as the background, or hidden HTML elements.
    For multi-modal inputs, malicious instructions could be hidden in the data itself
    (e.g. in the pixels of an image) or in file metadata (e.g. EXIF for images, ID3
    tags for audio, or document metadata).


    Inputs can also be obscured via an encoding scheme such as base64 or rot13. This
    may bypass LLM guardrails that identify malicious content and may not be as easily
    identifiable as malicious to a human in the loop.'
