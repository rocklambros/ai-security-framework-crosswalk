  target_description: 'An AI Bill of Materials (AI BOM) contains a full listing of
    artifacts and resources that were used in building the AI. The AI BOM can help
    mitigate supply chain risks and enable rapid response to reported vulnerabilities.


    This can include maintaining dataset provenance, i.e. a detailed history of datasets
    used for AI applications. The history can include information about the dataset
    source as well as well as a complete record of any modifications.'
