  source_name: Ensure logs are tamper-evident and independently verifiable.
  source_description: Ensure logs are tamper-evident and independently verifiable.
  target_name: Search Open Technical Databases
  target_description: 'Adversaries may search for publicly available research and
    technical documentation to learn how and where AI is used within a victim organization.

    The adversary can use this information to identify targets for attack, or to tailor
    an existing attack to make it more effective.

    Organizations often use open source model architectures trained on additional
    proprietary data in production.

    Knowledge of this underlying architecture allows the adversary to craft more realistic
    proxy models ([Create Proxy AI Model](/techniques/AML.T0005)).

    An adversary can search these resources for publications for authors employed
    at the victim organization.


    Research and technical materials may exist as academic papers published in [Journals
    and Conference Proceedings](/techniques/AML.T0000.000), or stored in [Pre-Print
    Repositories](/techniques/AML.T0000.001), as well as [Technical Blogs](/techniques/AML.T0000.002).'
