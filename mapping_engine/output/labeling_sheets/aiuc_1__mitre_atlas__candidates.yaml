  target_name: Resource-Intensive Queries
  target_description: 'Adversaries may craft inputs specifically designed to increase
    the compute resources required for processing.


    For generative AI models, adversaries may use long input sequences, requests for
    extremely long outputs, or prompts that require complex reasoning as strategies
    for increasing compute costs [\[1\]][1]. For vision and language models, "sponge
    examples" [\[2\]][2] can be used to maximize energy consumption and decision latency.

    Utilizing fewer resource-intensive queries instead of simply flooding the model
    with excessive queries may be more difficult to detect and block or limit.


    [1]: https://genai.owasp.org/resource/owasp-top-10-for-llm-applications-2025/

    [2]: https://arxiv.org/abs/2006.03463'
