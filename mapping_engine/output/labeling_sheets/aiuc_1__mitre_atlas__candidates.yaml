  notes: AUP user alerts directly mitigate trusted output components manipulation.
  source_name: User-facing alerts when acceptable use policy is violated.
  source_description: User-facing alerts when acceptable use policy is violated.
  target_name: LLM Trusted Output Components Manipulation
  target_description: 'Adversaries may utilize prompts to a large language model (LLM)
    which manipulate various components of its response in order to make it appear
    trustworthy to the user. This helps the adversary continue to operate in the victim''s
    environment and evade detection by the users it interacts with.


    The LLM may be instructed to tailor its language to appear more trustworthy to
    the user or attempt to manipulate the user to take certain actions. Other response
    components that could be manipulated include links, recommended follow-up actions,
    retrieved document metadata, and [Citations](/techniques/AML.T0067.000).'
