  source_name: Manage public release of technical details
  source_node_id: aiuc_1:B003
  target_description: Limit the public release of technical information about the
    AI stack used in an organization's products or services. Technical knowledge of
    how AI is used can be leveraged by adversaries to perform targeting and tailor
    attacks to the target system. Additionally, consider limiting the release of organizational
    information - including physical locations, researcher names, and department structures
    - from which technical details such as AI techniques, model architectures, or
    datasets may be inferred.
  target_name: Limit Public Release of Information
  target_node_id: mitre_atlas:AML.M0000
