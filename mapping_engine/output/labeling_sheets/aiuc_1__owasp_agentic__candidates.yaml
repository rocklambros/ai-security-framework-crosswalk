  notes: Risk assessment for tool decisions directly addresses tool misuse/exploitation.
  source_name: Risk assessment and decision record evaluating cloud vs. on-premises
    factors.
  source_description: Risk assessment and decision record evaluating cloud vs. on-premises
    factors.
  target_name: Tool Misuse and Exploitation
  target_description: 'Agents can misuse legitimate tools due to prompt injection,
    misalignment, or unsafe delegation or ambiguous instruction - leading to data
    exfiltration, tool output manipulation or workflow hijacking. Risks arise from
    how the agent chooses and applies tools; agent memory, dynamic tool selection,
    and delegation can contribute to misuse via chaining, privilege escalation, and
    unintended actions. This relates to LLM06:2025 (Excessive Agency), which addresses
    excessive autonomy but focuses on the misuse of legitimate tools. This entry covers
    cases where the agent operates within its authorized privileges but applies a
    legitimate tool in an unsafe or unintended way - for example deleting valuable
    data, over-invoking costly APIs, or exfiltrating information. If the misuse involves
    privilege escalation or credential inheritance, it falls under ASI03 (Identity
    & Privilege Abuse); if the misuse results in arbitrary or injected code execution,
    it is classified under ASI05 (Unexpected Code Execution). Finally, tool definitions
    increasingly come via MCP servers, creating a natural overlap with ASI04 (Agentic
    Supply Chain Vulnerabilities). The entry maps to T2 Tool Misuse in the Agentic
    AI Threats and Mitigations Guide whilst T4 Resource Overload and T16 Insecure
    Inter-Agent Protocol Abuse represent contributing factors that can amplify or
    enable tool exploitation . The entry aligns with AIVSS Core Risk: Agentic AI Tool
    Misuse .'
