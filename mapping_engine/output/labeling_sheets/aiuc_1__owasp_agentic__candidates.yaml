  notes: Monitoring AI risk categories supports cascading-failure detection.
  source_name: Monitor AI risk categories
  source_description: Implement monitoring of AI systems across risk categories.
  target_name: Cascading Failures
  target_description: "Agentic cascading failures occur when a single fault (hallucination,\
    \ malicious input, corrupted tool, or poisoned memory) propagates across autonomous\
    \ agents, compounding into system-wide harm. Because agents plan, persist, and\
    \ delegate autonomously, a single error can bypass stepwise human checks and persist\
    \ in a saved state. As agents form emergent links to new tools or peers, these\
    \ latent faults chain into privileged operations that compromise confidentiality,\
    \ integrity, availability, leading to widespread service failures across agent\
    \ networks, systems, and workflows. Cascading Failures describes the propagation\
    \ and amplification of an initial fault-not the initial vulnerability itself-across\
    \ agents, tools, and workflows, turning a single error into system-wide impact.\
    \ ASI08 focuses on the propagation and amplification of faults rather than their\
    \ origin. Use the initial defect under ASI04 , ASI06 , or ASI07 when it represents\
    \ a direct compromise - such as a tainted dependency, poisoned memory, or spoofed\
    \ message - and apply ASI08 only when that defect spreads across agents, sessions,\
    \ or workflows , causing measurable fan-out or systemic impact beyond the original\
    \ breach. Observable symptoms include rapid fan-out where one faulty decision\
    \ triggers many downstream agents or tasks in a short time, cross-domain or tenant\
    \ spread beyond the original context, oscillating retries or feedback loops between\
    \ agents, and downstream queue storms or repeated identical intents-each providing\
    \ clear detection hooks that make ASI08 operationally actionable. Cascading failures\
    \ amplify across interconnected agents, chaining OWASP LLM Top 10 risks. LLM01:2025\
    \ Prompt Injection and LLM06:2025 Excessive Agency can trigger autonomous tool\
    \ runs that spread errors without human checks, while LLM04:2025 Data and Model\
    \ Poisoning in persistent memory can skew decisions across sessions and workflows\
    \ . Agentic AI - Threats and Mitigations 1.1 covers this threat in T5 \u2013 Cascading\
    \ Hallucination "
