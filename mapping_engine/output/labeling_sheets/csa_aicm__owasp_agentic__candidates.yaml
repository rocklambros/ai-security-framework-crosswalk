  source_name: Supply Chain Inventory
  source_description: Develop and maintain an inventory of all supply chain relationships.
  target_name: Identity and PrivilegeAbuse
  target_description: "Identity & Privilege Abuse exploits dynamic trust and delegation\
    \ in agents to escalate access and bypass controls by manipulating delegation\
    \ chains, role inheritance, control flows, and agent context; context includes\
    \ cached credentials or conversation history across interconnected systems. In\
    \ this context, identity refers both to the agent\u2019s defined persona and to\
    \ any authentication material that represents it. Agent-toagent trust or inherited\
    \ credentials can be exploited to escalate access, hijack privileges, or execute\
    \ unauthorized actions. This risk arises from the architectural mismatch between\
    \ user-centric identity systems and agentic design. Without a distinct, governed\
    \ identity of its own, an agent operates in an attribution gap that makes enforcing\
    \ true least privilege impossible. Identity in this context includes both the\
    \ agent\u2019s assigned persona and any authentication material (API keys, OAuth\
    \ tokens, delegated user sessions) that represent it. This differs scenario in\
    \ ASI02 (Tools Misuse) which is an unintended or unsafe use of already granted\
    \ privilege by a principal misusing its own tools. Identity & Privilege Abuse\
    \ is the agentic evolution of Excessive Agency (LLM06:2025) . It often leverages\
    \ Prompt Injection (LLM01:2025) , and because of agent permissions, tool integrations,\
    \ and multi-agent systems, the impact can amplify and exceed Sensitive Information\
    \ Disclosure (LLM02:2025) to directly compromise the confidentiality, integrity,\
    \ and availability of systems and data the agent can reach. In the OWASP ASI Threats\
    \ and Mitigations, it maps one-to-one to T3: Privilege Compromise , and in OWASP\
    \ AIVSS it corresponds to Core Risk 2: Agent Access Control Violation ."
