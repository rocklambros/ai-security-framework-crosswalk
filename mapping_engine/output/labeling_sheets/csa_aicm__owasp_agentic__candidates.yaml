  notes: Password strength does not address human-agent trust exploitation.
  source_name: Strong Password Policy and Procedures
  source_description: Establish, document, approve, communicate, implement, apply,
    evaluate and maintain strong password policies and procedures. Review and update
    the policies and procedures at least annually.
  target_name: Human-Agent TrustExploitation
  target_description: Intelligent agents can establish strong trust with human users
    through their natural language fluency, emotional intelligence, and perceived
    expertise, known as anthropomorphism . Adversaries or misaligned designs may exploit
    this trust to influence user decisions, extract sensitive information, or steer
    outcomes for malicious purposes. In agentic systems, this risk is amplified when
    humans over-rely on autonomous recommendations or unverifiable rationales, approving
    actions without independent validation. By leveraging authority bias and persuasive
    explainability, attackers can bypass oversight, leading to data breaches, financial
    losses, downstream and reputational harms. The agent acts as an untraceable "bad
    influence," manipulating the human into performing the final, audited action,
    making the agent's role in the compromise invisible to forensics. Automation bias,
    perceived authority, and anthropomorphic cues make abuse look legitimate and hard
    to spot. Over-reliance on agent recommendations, especially when they appear confident
    or authoritative, increases the chance of harmful decision-making. This entry
    is about human misperception or over-reliance whereas ASI10 is agent intent deviation.
    The entry builds on LLM06:2025 Excessive Agency , and can be caused by LLM01:2025
    Prompt Injection , LLM05:2025 Improper Output Handling , or results in LLM09:2025
    Misinformation . Aligns with Agentic AI Threats and Mitigations Guide (T7) Misaligned
    & Deceptive , (T8) Repudiation & Untraceability , (T10) Overwhelming the Human
    in the Loop .
