  source_name: AI Impact Assessment
  source_description: Establish, document, and communicate to all relevant stakeholders
    an AI Impact Assessment process and its criteria to regularly evaluate the ethical,
    societal, operational, legal, and security impacts of the AI system throughout
    its lifecycle.
  target_name: Agent Goal Hijack
  target_description: "AI Agents exhibit autonomous ability to execute a series of\
    \ tasks to achieve a goal. Due to inherent weaknesses in how natural-language\
    \ instructions and related content are processed, agents and the underlying model\
    \ cannot reliably distinguish instructions from related content. As a result,\
    \ attackers can manipulate an agent\u2019s objectives, task selection, or decision\
    \ pathways through a variety of techniques - including, but not limited to, prompt-based\
    \ manipulation, deceptive tool outputs, malicious artefacts, forged agent-to-agent\
    \ messages, or poisoned external data. Because agents rely on untyped natural-language\
    \ inputs and loosely governed orchestration logic, they cannot reliably distinguish\
    \ legitimate instructions from attacker -controlled content. Unlike LLM01:2025\
    \ , which focuses on altering a single model response, ASI01 captures the broader\
    \ agentic impact where manipulated inputs redirect goals, panning (when used)\
    \ and multi-step behavior. Agent Goal Hijack differs from ASI06 (Memory & Context\
    \ Poisoning) and ASI10 (Rogue Agents) because the attacker directly alters the\
    \ agent\u2019s goals, instructions, or decision pathways - regardless of whether\
    \ the manipulation occurs interactively or through pre-positioned inputs such\
    \ as documents, templates, or external data sources. ASI06 focuses on the persistent\
    \ corruption of stored context or long-term memory, while ASI10 captures autonomous\
    \ misalignment that emerges without active attacker control. In the OWASP Agentic\
    \ AI Threats & Mitigations Guide, ASI01 corresponds to T06 Goal Manipulation (altering\
    \ the agent\u2019s objectives) and T07 Misaligned & Deceptive Behaviors (bypassing\
    \ safeguards or deceiving humans). Together, these illustrate how attackers can\
    \ subvert the agent\u2019s objectives and action-selection logic, redirecting\
    \ its autonomy toward unintended or harmful outcomes."
