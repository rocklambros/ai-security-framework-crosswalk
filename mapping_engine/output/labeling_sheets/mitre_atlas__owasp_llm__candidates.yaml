  source_name: Manipulate User LLM Chat History
  source_description: "Adversaries may manipulate a user's large language model (LLM)\
    \ chat history to cover the tracks of their malicious behavior. They may hide\
    \ persistent changes they have made to the LLM's behavior, or obscure their attempts\
    \ at discovering private information about the user.\n\nTo do so, adversaries\
    \ may delete or edit existing messages or create new threads as part of their\
    \ coverup. This is feasible if the adversary has the victim's authentication tokens\
    \ for the backend LLM service or if they have direct access to the victim's chat\
    \ interface. \n\nChat interfaces (especially desktop interfaces) often do not\
    \ show the injected prompt for any ongoing chat, as they update chat history only\
    \ once when initially opening it. This can help the adversary's manipulations\
    \ go unnoticed by the victim."
  target_name: Misinformation
  target_description: ''
