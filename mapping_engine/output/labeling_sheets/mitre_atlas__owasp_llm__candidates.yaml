  source_name: Privileged AI Agent Permissions Configuration
  source_description: AI agents may be granted elevated privileges above that of a
    normal user to enable desired workflows. When deploying a privileged AI agent,
    or an agent that interacts with multiple users, it is important to implement robust
    policies and controls on permissions of the privileged agent. These controls include
    Role-Based Access Controls (RBAC), Attribute-Based Access Controls (ABAC), and
    the principle of least privilege so that the agent is only granted the necessary
    permissions to access tools and resources required to accomplish its designated
    task(s).
  target_name: Supply Chain
