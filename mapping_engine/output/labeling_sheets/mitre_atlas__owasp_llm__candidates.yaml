  source_name: Modify AI Agent Configuration
  source_description: 'Adversaries may modify the configuration files for AI agents
    on a system. This allows malicious changes to persist beyond the life of a single
    agent and affects any agents that share the configuration.


    Configuration changes may include modifications to the system prompt, tampering
    with or replacing knowledge sources, modification to settings of connected tools,
    and more. Through those changes, an attacker could redirect outputs or tools to
    malicious services, embed covert instructions that exfiltrate data, or weaken
    security controls that normally restrict agent behavior.


    Adversaries may modify or disable a configuration setting related to security
    controls, such as those that would prevent the AI Agent from taking actions that
    may be harmful to the user''s system without human-in-the-loop oversight. Disabling
    AI agent security features may allow adversaries to achieve their malicious goals
    and maintain long-term corruption of the AI agent.'
  target_name: Prompt Injection
  target_description: ''
