  source_name: Escape to Host
  source_description: 'Adversaries may break out of a container or virtualized environment
    to gain access to the underlying host. This can allow an adversary access to other
    containerized or virtualized resources from the host level or to the host itself.
    In principle, containerized / virtualized resources should provide a clear separation
    of application functionality and be isolated from the host environment.


    There are many ways an adversary may escape from a container or sandbox environment
    via AI Systems. For example, modifying an AI Agent''s configuration to disable
    safety features or user confirmations could allow the adversary to invoke tools
    to be run on host environments rather than in the sandbox.'
  target_name: Excessive Agency
