  notes: ''
  source_name: Black-Box Transfer
  source_description: 'In Black-Box Transfer attacks, the adversary uses one or more
    proxy models (trained via [Create Proxy AI Model](/techniques/AML.T0005) or [Train
    Proxy via Replication](/techniques/AML.T0005.001)) they have full access to and
    are representative of the target model.

    The adversary uses [White-Box Optimization](/techniques/AML.T0043.000) on the
    proxy models to generate adversarial examples.

    If the set of proxy models are close enough to the target model, the adversarial
    example should generalize from one to another.

    This means that an attack that works for the proxy models will likely then work
    for the target model.

    If the adversary has [AI Model Inference API Access](/techniques/AML.T0040), they
    may use [Verify Attack](/techniques/AML.T0042) to confirm the attack is working
    and incorporate that information into their training process.

    '
  target_name: Sensitive Information Disclosure
  target_description: ''
