  source_name: Stage Capabilities
  source_description: 'Adversaries may upload, install, or otherwise set up capabilities
    that can be used during targeting. To support their operations, an adversary may
    need to take capabilities they developed ([Develop Capabilities](/techniques/AML.T0017))
    or obtained ([Obtain Capabilities](/techniques/AML.T0016)) and stage them on infrastructure
    under their control. These capabilities may be staged on infrastructure that was
    previously purchased/rented by the adversary ([Acquire Infrastructure](/techniques/AML.T0008))
    or was otherwise compromised by them. Capabilities may also be staged on web services,
    such as GitHub, model registries, such as Hugging Face, or container registries.


    Adversaries may stage a variety of AI Artifacts including poisoned datasets ([Publish
    Poisoned Datasets](/techniques/AML.T0019), malicious models ([Publish Poisoned
    Models](/techniques/AML.T0058), and prompt injections. They may target names of
    legitimate companies or products, engage in typosquatting, or use hallucinated
    entities ([Discover LLM Hallucinations](/techniques/AML.T0062)).'
  target_name: Prompt Injection
  target_description: ''
