  target_name: Memory & Context Poisoning
  target_description: "Agentic systems rely on stored and retrievable information\
    \ which can be a snapshot of its conversation history, a memory tool or expanded\
    \ context, which supports continuity across tasks and reasoning cycles. Context\
    \ includes any information an agent retains, retrieves, or reuses, such as summaries,\
    \ embeddings, and RAG stores but excludes one-time input prompts covered under\
    \ LLM01 :2025 Prompt Injection . In Memory and Context Poisoning , adversaries\
    \ corrupt or seed this context with malicious or misleading data, causing future\
    \ reasoning, planning, or tool use to become biased, unsafe, or aid exfiltration.\
    \ Ingestion sources such as uploads, API feeds, user input, or peer-agent exchanges\
    \ may be untrusted or only partially validated. This risk is distinct from ASI01\
    \ (Goal Hijack), which captures direct goal manipulation, and ASI08 ( Cascading\
    \ Failures), which describes degradation after poisoning occurs. However, memory\
    \ poisoning frequently leads to goal hijacking ( ASI01 ), as corrupted context\
    \ or long-term memory can alter the agent\u2019s goal interpretation, reasoning\
    \ path, or tool-selection logic. It builds on LLM01:2025 Prompt Injection , LLM04:2025\
    \ Data and Model Poisoning , and LLM08:2025 Vector and Embedding Weaknesses ,\
    \ but focuses on persistent corruption of agent memory and retrievable context\
    \ that propagates across sessions and alters autonomous reasoning. It maps to\
    \ T1 Memory Poisoning in Agentic Threats and Mitigations, with related impacts\
    \ in T4 Memory Overload , T6 Broken Goals , and T12 Shared Memory Poisoning .\
    \ In AIVSS, the AARS fields Memory Use and Contextual Awareness raise the agentic\
    \ vulnerability score."
