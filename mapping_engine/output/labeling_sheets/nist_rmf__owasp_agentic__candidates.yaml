    \ A2A (Agent2Agent) - agentic registries and related artifacts, or update channels.\
    \ These dependencies may introduce unsafe code, hidden instructions, or deceptive\
    \ behaviors into the agent\u2019s execution chain. Supply chain is covered in\
    \ depth in LLM03:2025 Supply Chain Vulnerabilities. However, its focus is on static\
    \ dependencies. Unlike traditional AI or software supply chains, agentic ecosystems\
    \ often compose capabilities at runtime - loading external tools- agent personas\
    \ dynamically \u2013 thereby increasing the attack surface. This distributed run-time\
    \ coordination - combined with agentic autonomy - creates a live supply chain\
    \ that can cascade vulnerabilities across agents. These shifts focus from manifest\
    \ to run-time security of a diverse and often opaque component. Tackling this\
    \ problem requires careful development-time tooling and runtime orchestration,\
    \ where components are dynamically loaded, shared, and trusted. The entry maps\
    \ to T17 Supply Chain Compromise in Agentic Threats and Mitigations and across\
    \ T2 Tool Misuse , T11 Unexpected RCE and Code Attacks, T12 Agent Communication\
    \ Poisoning, T13 Rogue Agent and T16 Insecure Inter-Agent Protocol Abuse ."
