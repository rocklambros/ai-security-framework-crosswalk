  target_name: Insecure Inter-AgentCommunication
  target_description: "Multi agent systems depend on continuous communication between\
    \ autonomous agents that coordinate via APIs, message buses, and shared memory,\
    \ significantly expanding the attack surface. Decentralized architecture, varying\
    \ autonomy, and uneven trust make perimeter-based security models ineffective.\
    \ Weak inter-agent controls for authentication, integrity, confidentiality, or\
    \ authorization let attackers intercept, manipulate, spoof, or block messages.\
    \ Insecure Inter-Agent Communication occurs when these exchanges lack proper authentication,\
    \ integrity, or semantic validation-allowing interception, spoofing, or manipulation\
    \ of agent messages and intents. The threat spans transport, routing, discovery,\
    \ and semantic layers, including covert or side-channels where agents leak or\
    \ infer data through timing or behavioral cues. This differs from ASI03 (Identity\
    \ & Privilege Abuse), which focuses on credential and permissions misuse, and\
    \ ASI06 (Memory & Context Poisoning), which targets stored knowledge corruption.\
    \ ASI07 focuses on compromising real-time messages between agents, leading to\
    \ misinformation, privilege confusion, or coordinated manipulation across distributed\
    \ agentic systems. The entry is covered by T12 \u2013 Agent Communication Poisoning\
    \ & T16 \u2013 Insecure Inter-Agent Protocol Abuse in Agentic Threats and Mitigations"
