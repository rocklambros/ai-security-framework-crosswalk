  target_name: Rogue Agents
  target_description: "Rogue Agents are malicious or compromised AI Agents that deviate\
    \ from their intended function or authorized scope, acting harmfully, deceptively,\
    \ or parasitically within multi-agent or human-agent ecosystems. The agent\u2019\
    s actions may individually appear legitimate, but its emergent behavior becomes\
    \ harmful, creating a containment gap for traditional rule-based systems. While\
    \ external compromise, such as Prompt Injection (LLM01:2025), Goal Hijack (AS01)\
    \ or Supply Chain tampering (AS04) can initiate the divergence, ASI10 focuses\
    \ on the loss of behavioral integrity and governance once the drift begins , not\
    \ the initial intrusion itself. Consequences include sensitive information disclosure,\
    \ misinformation propagation, workflow hijacking, and operational sabotage. Rogue\
    \ Agents represent a distinct risk of behavioral divergence, unlike Excessive\
    \ Agency (LLM06:2025), which focuses on over-granted permissions, and can be amplified\
    \ \"insider threats\" due to the speed and scale of Agentic systems. Consequences\
    \ include Sensitive Information Disclosure (LLM02;2025), Misinformation (LLM09:2025).\
    \ In the OWASP Agentic AI Threats and Mitigations guide, ASI10 corresponds to\
    \ T13 \u2013 Rogue Agents in Multi-Agent Systems . The OWASP AIVSS framework maps\
    \ this risk primarily to Behavioral Integrity (BI) , Operational Security (OS)\
    \ , and Compliance Violations (CV) , with elevated severity for critical or self-propagating\
    \ deployments."
